# /etc/nginx/conf.d/activepieces.conf
#
# ActivePieces lives on rootless podman at 127.0.0.1:8090 and is fronted by
# this system nginx, matching the pattern used by ayanamikaine.com and
# stellawiki.com. Certbot will rewrite this file in place to add the 443/SSL
# block once the cert is issued.

upstream activepieces_app {
    server 127.0.0.1:8090;
}

server {
    listen 80;
    listen [::]:80;
    server_name activepieces.ayanamikaine.com;

    # Larger upload cap — pieces and flow imports can be a few MB.
    client_max_body_size 50M;

    # WebSocket and long-poll friendly proxy.
    location / {
        proxy_pass http://activepieces_app;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webhooks and long-running flow runs can sit idle on the socket.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
